services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "8443"
      KC_HOSTNAME_STRICT: "true"
      KC_HTTP_ENABLED: "true"
    # Port 8080 NOT exposed to host — only nginx can reach it internally
    expose:
      - "8080"
    volumes:
      - keycloak_data:/opt/keycloak/data        # persists DB across restarts
      - ./keycloak:/opt/keycloak/data/import    # only used on first boot
    command: start-dev --import-realm

  nginx:
    image: nginx:alpine
    ports:
      - "8443:8443"   # HTTPS only — single entry point for Keycloak
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - keycloak

volumes:
  keycloak_data:
